<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triển lãm - Tech4Life</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { min-height: 100vh; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col font-sans text-gray-800">
    <header id="app-header"></header>
    
    <main class="flex-grow container mx-auto px-4 py-12">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 md:p-12">
            <div class="inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium mb-4">Tech4Life 2026</div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-6">Triển lãm</h1>
            <p class="text-lg text-slate-600 max-w-3xl leading-relaxed">
                Chào mừng bạn đến với trang <span class="font-semibold text-slate-800">Triển lãm</span>. 
                Nội dung chi tiết của phần này đang được cập nhật và sẽ sớm ra mắt.
            </p>
            
            <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Skeleton loader / Placeholder blocks -->
                <div class="h-48 bg-slate-100 rounded-lg border border-slate-200 animate-pulse"></div>
                <div class="h-48 bg-slate-100 rounded-lg border border-slate-200 animate-pulse delay-75"></div>
                <div class="h-48 bg-slate-100 rounded-lg border border-slate-200 animate-pulse delay-150"></div>
            </div>
        </div>
    </main>

    <footer id="app-footer"></footer>
    
    <script src="assets/js/main.js"></script>
</body>
</html>
