        .hero-enter {

        .hero-d1 {
            animation-delay: 50ms;
        }

        .hero-d2 {

        }

            animation-delay: 250ms;
        }

        .hero-d4 {
            animation-delay: 350ms;
        }

        .hero-d5 {
            animation-delay: 450ms;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
